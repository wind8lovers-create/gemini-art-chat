<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeling Gallery</title>
    <link rel="stylesheet" href="style.css?v=1784683212388">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<body>
    <header class="header glass-panel">
        <div class="logo" style="display: flex; align-items: center; gap: 12px;">
            <h1>🤖 Feeling Gallery</h1>
        </div>
        <!-- ヘッダー内のカテゴリ切り替えナビゲーション -->
        <nav class="nav">
            <button class="nav-btn active" data-category="media" title="生成画像・動画">🖼️</button>
            <button class="nav-btn" data-category="prompt" title="プロンプトメモ">💡</button>
        </nav>
    </header>

    <div class="layout">
        <!-- サイドバー -->
        <aside class="sidebar glass-panel">
            <ul class="category-list">
                <li class="category-item active" data-category="media">生成画像・動画<br><small>(AI Generated Media)</small></li>
                <li class="category-item" data-category="prompt">プロンプトメモ<br><small>(Prompt Memo)</small></li>
            </ul>

            <div class="sidebar-footer" style="text-align: center;">
                <p><strong>&lt;制作環境&gt;</strong></p>
                <p style="font-size: 0.85rem; line-height: 1.6;">
                    Next.js v16.2.10 / React v19.2.4<br>
                    Gemini Pro Vision<br>
                    Antigravity AI<br>
                    <a href="https://github.com/wind8lovers-create/gemini-art-chat" target="_blank" rel="noopener" style="color: #ccc; text-decoration: underline;">GitHub</a>
                </p>
                <br>
                <p><strong>&lt;画像動画生成AI&gt;</strong></p>
                <p style="font-size: 0.85rem; line-height: 1.6;">
                    -Gemini 3.1 Pro-<br>
                    Nano Banana Pro<br>
                    Nano Banana 2<br>
                    Veo 3.1<br>
                    <br>
                    Hazuki-kiz-<br>
                    <img src="assets/a104e18c-528e-4d68-9f9c-a17c481c064d.png" alt="Hazuki" style="width: 100%; max-width: 140px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); margin-top: 8px;" />
                </p>
            </div>
        </aside>

        <!-- メインコンテンツ -->
        <main class="main-content">
            <div id="gallery-grid" class="grid"></div>
        </main>
    </div>

    <!-- モーダル -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="modal-close" class="modal-close">✕</button>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="data.js?v=1784683212388"></script>
    <script src="script.js?v=1784683212388"></script>

</html>
